# resume.zhilin.club - redirect HTTP to HTTPS.
server {
    listen 80;
    server_name resume.zhilin.club;
    return 301 https://resume.zhilin.club$request_uri;
}

server {
    listen 443 ssl http2;
    server_name resume.zhilin.club;

    root /usr/share/nginx/html/resume;
    index index.html;

    ssl_certificate /etc/nginx/ssl/resume.zhilin.club.fullchain.cer;
    ssl_certificate_key /etc/nginx/ssl/resume.zhilin.club.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    location / {
        try_files $uri $uri/ =404;
    }
}
